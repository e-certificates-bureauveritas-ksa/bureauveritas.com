<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Authenticate your Document</title>
    
    <style>
        /* CSS Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #f3f4f6; user-select: none; -webkit-user-select: none; }

        /* Header Layout */
        .qrc-header {
            width: 100%;
            background-color: #000099;
            color: #ffffff;
            padding: 16px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            border-bottom: 1px solid #000066;
        }
        .qrc-app-logo-container { display: flex; align-items: center; gap: 16px; width: 100%; }
        .qrc-app-logo img { width: 45px; height: auto; display: block; }
        .qrc-app-logo-text { font-size: 22px; font-weight: normal; color: #ffffff; }
        .qrc-app-logo-text b { font-weight: bold; }
        .qrc-app-logo-desc { font-size: 11.5px; color: #e2e8f0; margin-top: 3px; line-height: 1.3; }

        /* Main Content & Background */
        .qrc-content { width: 100%; min-height: calc(100vh - 85px); position: relative; }
        .qrc-bg-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: url('./background_industry (1).jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }

        /* Verification Card Container */
        .qrc-code-container {
            position: relative; z-index: 2; width: 100%; display: flex; justify-content: center; padding: 40px 24px;
        }
        .qrc-code-reader {
            width: 100%; max-width: 460px; background-color: #ffffff;
            border-bottom-left-radius: 6px; border-bottom-right-radius: 6px;
            box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.4); overflow: hidden; position: relative;
        }

        /* Card Header Graphic */
        .qrc-code-reader-header {
            width: 100%; position: relative; display: flex; justify-content: center; align-items: center;
        }
        .qrc-code-reader-header .state-background {
            width: 100%; height: auto; display: block;
        }
        .qrc-code-reader-header .state-icon {
            position: absolute; width: 36px; height: 36px; z-index: 3; top: 50%; transform: translateY(-50%);
        }

        /* Data Layout */
        .qrc-code-reader-content { padding: 40px 16px 32px 32px; position: relative; z-index: 2; background: #ffffff; }
        .qrc-data-table { width: 100%; border-collapse: collapse; font-size: 11.5px; color: #000000; }
        .qrc-data-table tr { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); margin-bottom: 8px; align-items: start; }
        .qrc-label { grid-column: span 5; font-weight: bold; }
        .qrc-value { grid-column: span 7; font-weight: normal; color: #0f172a; }
        
        .text-uppercase { text-transform: uppercase; }
        .text-bold-val { font-weight: bold; color: #000000; }
        .break-all { word-break: break-all; }

        /* Notice text spacing */
        .qrc-code-reader-disclaimer { margin-top: 160px; font-size: 10.5px; font-weight: bold; color: #000000; line-height: 1.4; }

        /* Fold effect */
        .page-fold { position: absolute; bottom: 0; right: 0; width: 48px; height: 48px; pointer-events: none; overflow: hidden; z-index: 5; }
        .page-fold-triangle { position: absolute; top: 0; right: 0; width: 0; height: 0; border-top: 48px solid #ffffff; border-right: 48px solid transparent; box-shadow: -2px -2px 5px rgba(0,0,0,0.05); }

        /* Footer links */
        .qrc-footer { position: absolute; bottom: 15px; left: 20px; z-index: 10; }
        .qrc-bv-footer-links { list-style: none; }
        .qrc-bv-footer-links li a { font-size: 11px; font-weight: bold; color: #000000; text-decoration: none; display: flex; flex-direction: column; }
        .qrc-bv-footer-links li a span { font-size: 9px; color: #334155; font-weight: normal; margin-bottom: 2px; }
        .qrc-bv-footer-links li a:hover b { text-decoration: underline; }

        /* Loading Spinner */
        .qrc-spinner-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 12px; }
        .qrc-spinner { border: 3px solid #f3f4f6; border-top: 3px solid #000099; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

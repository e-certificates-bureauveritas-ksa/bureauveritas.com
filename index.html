<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7fafc;
        }
    </style>
</head>
<body>

    <div id="status">Loading...</div>

<script>
    const secretKey = "MyGitHubSecureKey123";

    // URL থেকে এনক্রিপ্ট করা ডাটা নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const encryptedData = urlParams.get('file');
    const statusDiv = document.getElementById('status');

    if (encryptedData) {
        try {
            // URL-safe ফরম্যাট থেকে স্ট্যান্ডার্ড Base64 এ ব্যাক করা
            let formattedData = encryptedData.replace(/-/g, '+').replace(/_/g, '/');
            
            // ডিক্রিপ্ট করা
            const bytes = CryptoJS.AES.decrypt(formattedData, secretKey);
            const decryptedLink = bytes.toString(CryptoJS.enc.Utf8);

            if (decryptedLink && decryptedLink.startsWith('http')) {
                // কোনো লেখা না দেখিয়ে সরাসরি ফাইল লিঙ্কে পাঠিয়ে দেওয়া
                window.location.href = decryptedLink;
            } else {
                statusDiv.innerText = "Error: Invalid file link.";
            }
        } catch (e) {
            statusDiv.innerText = "Error: Decryption failed.";
        }
    } else {
        statusDiv.innerText = "Error: No file specified.";
    }
</script>

</body>
</html>

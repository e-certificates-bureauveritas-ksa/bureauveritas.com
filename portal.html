<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Document Verification Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-950 text-white p-4 shadow">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-xl font-bold">🛡️ Verification Portal</span>
        </div>
    </nav>

    <div class="container mx-auto p-6 flex flex-col md:flex-row gap-6 justify-center items-start">
        
        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">1. Upload & Generate</h2>
            <div class="space-y-4">
                <input type="file" id="fileInput" accept="application/pdf, image/*" class="w-full text-sm text-gray-500 cursor-pointer" />
                <button onclick="generateSecureQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-medium">
                    Generate QR Code
                </button>
            </div>

            <div id="qrResult" class="mt-6 p-4 bg-gray-50 rounded border text-center hidden">
                <p class="text-sm text-green-600 font-medium mb-3">✅ Secure QR Generated!</p>
                <div id="qrcode" class="bg-white p-2 border inline-block mx-auto"></div>
                <p class="text-xs text-blue-600 underline mt-3 cursor-pointer break-all" id="generatedLink" onclick="simulateScan()"></p>
                <p class="text-[10px] text-gray-400 mt-1">(Click the link above to simulate scanning the QR code)</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-xl min-h-[400px] flex flex-col">
            <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">2. Live Verification Screen</h2>
            
            <div id="noDocState" class="flex-1 flex flex-col items-center justify-center text-center p-6 text-gray-400">
                <span class="text-5xl mb-2">🔍</span>
                <p class="text-sm font-medium">No Security Token Found!</p>
                <p class="text-xs">Scan the QR code or click the test link to verify the document.</p>
            </div>

            <div id="verifiedState" class="hidden flex-1 flex flex-col">
                <div class="bg-green-50 border border-green-200 p-3 rounded mb-4 text-green-800 text-xs font-mono">
                    <strong>✅ Document Authenticated Successfully</strong>
                </div>
                <div class="border rounded bg-gray-50 flex-1 p-2 min-h-[300px]" id="previewContainer"></div>
            </div>
        </div>

    </div>

    <script>
        let nextVerificationLink = "";

        // URL check when page loads
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('verify');
            if (docId) {
                const storedData = localStorage.getItem(docId);
                if (storedData) {
                    const payload = JSON.parse(storedData);
                    displayFile(payload.name, payload.type, payload.data);
                } else {
                    alert("Error: Document session expired or token invalid.");
                }
            }
        });

        function generateSecureQR() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a file first!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const fileData = e.target.result;
                
                // 1. Create a unique random ID (Simulating Database Key)
                const uniqueId = "doc_" + Math.random().toString(36).substr(2, 9);
                
                // 2. Save it to local storage to bypass long URL errors
                const payload = { name: file.name, type: file.type, data: fileData };
                localStorage.setItem(uniqueId, JSON.stringify(payload));

                // 3. Make clean tiny URL
                const currentUrl = window.location.href.split('?')[0];
                nextVerificationLink = `${currentUrl}?verify=${uniqueId}`;

                // 4. Update QR
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: nextVerificationLink,
                    width: 140,
                    height: 140
                });

                document.getElementById('qrResult').classList.remove('hidden');
                document.getElementById('generatedLink').innerText = "Click here to test QR Scan Result";
            };
            reader.readAsDataURL(file);
        }

        // Simulates scanning the QR code using phone
        function simulateScan() {
            if(nextVerificationLink) {
                window.location.href = nextVerificationLink;
            }
        }

        function displayFile(name, type, data) {
            document.getElementById('noDocState').classList.add('hidden');
            document.getElementById('verifiedState').classList.remove('hidden');
            const container = document.getElementById('previewContainer');
            container.innerHTML = "";

            if (type.includes('image')) {
                container.innerHTML = `<img src="${data}" class="max-w-full h-auto mx-auto rounded shadow"/>`;
            } else if (type.includes('pdf')) {
                container.innerHTML = `<iframe src="${data}" class="w-full h-[350px] border-0 rounded"></iframe>`;
            } else {
                container.innerHTML = `<p class="text-sm text-center p-10 text-gray-500">Document: ${name} (No preview available)</p>`;
            }
        }
    </script>
</body>
</html>
